      {familia:"Spacetourer MCA",modelo:"Spacetourer MCA 9P Diesel 180HP AT",cit:"CT9611E60824M01-1",pl:36759100,margen:0.10,tmp:{bono:4998000,aporteRed:772250,aporteSte:3427750,precio:31761100},cc:{bono:5593000,aporteRed:772250,aporteSte:3427750,aporteFin:500000,precio:31166100},ci:null},
      {familia:"Jumper MCA",modelo:"Jumper MCA L2H2 Diesel 140HP MT",cit:"CT9964E60525M03-2",pl:36640100,margen:0.10,tmp:{bono:5593000,aporteRed:769750,aporteSte:3930250,precio:31047100},cc:{bono:6188000,aporteRed:769750,aporteSte:3930250,aporteFin:500000,precio:30452100},ci:null},
      {familia:"Jumper MCA",modelo:"Jumper MCA L3H2 Diesel 140HP MT",cit:"CT9964E60525M02-9",pl:37949100,margen:0.10,tmp:{bono:5236000,aporteRed:797250,aporteSte:3602750,precio:32713100},cc:{bono:5831000,aporteRed:797250,aporteSte:3602750,aporteFin:500000,precio:32118100},ci:null},
      {familia:"Jumper MCA",modelo:"Jumper MCA L4H2 Diesel 140HP MT",cit:"CT9964E60525M00-1",pl:39139100,margen:0.10,tmp:{bono:4522000,aporteRed:822250,aporteSte:2977750,precio:34617100},cc:{bono:5117000,aporteRed:822250,aporteSte:2977750,aporteFin:500000,precio:34022100},ci:null},
    ],
  },
};

const APORTE_RED_PCT = 0.025;
const GASTOS_ROMA = 204500; // Gastos prorrateados Roma por auto
const fmt = (n) => "$" + Math.round(n).toLocaleString("es-CL");
const pct = (n) => (n * 100).toFixed(1) + "%";

const C = {
  bg:"#f5f6f8", card:"#fff", border:"#e0e3e8",
  primary:"#1a2332", accent:"#2563eb", accentLight:"#dbeafe",
  text:"#1a2332", muted:"#64748b", light:"#94a3b8",
  green:"#16a34a", greenBg:"#dcfce7", yellow:"#ca8a04", yellowBg:"#fef9c3",
  red:"#dc2626", redBg:"#fee2e2", peugeot:"#0f2b5b", citroen:"#c4161c",
};

const base = {
  input:{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none",background:C.card},
  row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"},
  label:{fontSize:13,color:C.muted},
  val:{fontSize:14,fontWeight:600},
  divider:{height:1,background:C.border,margin:"8px 0"},
  section:{padding:"14px 18px"},
  secTitle:{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:C.muted,marginBottom:10},
  card:{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:10},
};

let _id = 0;
const uid = () => ++_id;

function DealFinal() {
  const [marca, setMarca] = useState(null);
  const [tipo, setTipo] = useState(null);
  const [mIdx, setMIdx] = useState(null);
  const [pago, setPago] = useState("tmp");
  const [descPesos, setDescPesos] = useState("");
  const [bonoZonal, setBonoZonal] = useState("");
  const [comisionCredito, setComisionCredito] = useState("");
  const [showUtil, setShowUtil] = useState(false);

  // Documentation items: {id, nombre, monto, activo}
  const [docItems, setDocItems] = useState([
    {id:1,nombre:"SOAP",monto:18400,activo:true,fijo:true},
    {id:2,nombre:"Inscripción",monto:89560,activo:true,fijo:true},
    {id:3,nombre:"Trámite",monto:50000,activo:true,fijo:true},
    {id:4,nombre:"TAG",monto:15000,activo:true,fijo:true},
    {id:5,nombre:"GRAB",monto:35000,activo:true,fijo:true},
    {id:6,nombre:"Permiso Circulación",monto:0,activo:true,fijo:true},
    {id:7,nombre:"Impuesto Verde",monto:0,activo:true,fijo:true},
  ]);

  // Accesorios list: {id, nombre, monto}
  const [accItems, setAccItems] = useState([]);
  const [newAccNombre, setNewAccNombre] = useState("");
  const [newAccMonto, setNewAccMonto] = useState("");

  const modelos = useMemo(() => {
    if (!marca || !tipo) return [];
    return CATALOGO[marca]?.[tipo] || [];
  }, [marca, tipo]);

  const familias = useMemo(() => {
    const map = {};
    modelos.forEach((m, i) => {
      if (!map[m.familia]) map[m.familia] = [];
      map[m.familia].push({...m, idx:i});
    });
    return map;
  }, [modelos]);

  const auto = mIdx !== null ? modelos[mIdx] : null;
  const formasPago = useMemo(() => {
    if (!auto) return ["tmp","cc"];
    const fps = ["tmp","cc"];
    if (auto.ci) fps.push("ci");
    return fps;
  }, [auto]);
  const pe = formasPago.includes(pago) ? pago : "tmp";

  const calc = useMemo(() => {
    if (!auto) return null;
    const fp = auto[pe];
    if (!fp) return null;

    const esCom = tipo === "Comerciales";
    const maxDescPesos = Math.round(auto.pl * auto.margen);
    const descNum = Math.min(parseInt(descPesos) || 0, maxDescPesos);
    const descPompeyoPct = auto.pl > 0 ? descNum / auto.pl : 0;
    const bonoZonalNum = parseInt(bonoZonal) || 0;

    // Total dado del margen = CE + Pompeyo
    const aporteRedPesos = fp.aporteRed || 0;
    const cePct = auto.pl > 0 ? aporteRedPesos / auto.pl : 0;
    const totalDadoPct = descPompeyoPct + cePct; // % real que sale del margen

    const precioAuto = auto.pl - fp.bono - descNum - bonoZonalNum;
    const precioNeto = Math.round(precioAuto / 1.19);

    const totalDoc = docItems.filter(d=>d.activo).reduce((s,d)=>s+(parseInt(d.monto)||0), 0);
    const totalAcc = accItems.reduce((s,a)=>s+(parseInt(a.monto)||0), 0);
    const totalCliente = precioAuto + totalDoc + totalAcc;

    // Utilidad
    const margenBruto = maxDescPesos;
    const margenDisponible = margenBruto - aporteRedPesos;
    const margenNetoAuto = margenDisponible - descNum;
    const gastosRoma = GASTOS_ROMA;
    const margenNeto = margenNetoAuto - gastosRoma;
    const comCredNum = parseInt(comisionCredito) || 0;
    const utilidadProxy = margenNeto + comCredNum;
    const utilidadPct = auto.pl > 0 ? utilidadProxy / auto.pl : 0;

    let alertaDesc = null;
    if (descNum > maxDescPesos) alertaDesc = "roja";
    else if (totalDadoPct > 0.04) alertaDesc = "amarilla";

    let utilColor = C.green, utilIcon = "🟢";
    if (utilidadPct < 0.03) { utilColor = C.red; utilIcon = "🔴"; }
    else if (utilidadPct < 0.05) { utilColor = C.yellow; utilIcon = "🟡"; }

    return {
      fp, descNum, descPompeyoPct, totalDadoPct, cePct, maxDescPesos, bonoZonalNum,
      precioAuto, precioNeto, totalDoc, totalAcc, totalCliente,
      margenBruto, aporteRedPesos, margenDisponible, margenNetoAuto, gastosRoma, margenNeto,
      comCredNum, utilidadProxy, utilidadPct,
      alertaDesc, utilColor, utilIcon,
    };
  }, [auto, pe, descPesos, bonoZonal, docItems, accItems, comisionCredito, tipo]);

  const resetAll = useCallback(() => {
    setMarca(null);setTipo(null);setMIdx(null);setPago("tmp");
    setDescPesos("");setBonoZonal("");setComisionCredito("");
    setShowUtil(false);setAccItems([]);setLoadedDeal(false);
    setCliente("");setClosingStep(null);
    setDocItems(d=>d.map(x=>({...x,activo:true,monto:x.fijo?[18400,89560,50000,15000,35000,0,0][x.id-1]:x.monto})));
  }, []);

  const [shareMsg, setShareMsg] = useState(null);
  const [loadedDeal, setLoadedDeal] = useState(false);
  const [showLoadInput, setShowLoadInput] = useState(false);
  const [loadCode, setLoadCode] = useState("");
  const [cliente, setCliente] = useState("");
  const [vendedor, setVendedor] = useState("");
  const [deals, setDeals] = useState([]);
  const [showRegistro, setShowRegistro] = useState(false);
  const [closingStep, setClosingStep] = useState(null); // null | "confirm" | "saving" | "done"

  const encodeDeal = useCallback(() => {
    if (!auto || !calc) return null;
    const state = {
      m: marca, t: tipo, i: mIdx, p: pago,
      d: descPesos, bz: bonoZonal, cc: comisionCredito,
      cl: cliente, v: vendedor,
      doc: docItems.map(x => ({ id:x.id, a:x.activo?1:0, m:x.monto })),
      acc: accItems.map(x => ({ n:x.nombre, m:x.monto })),
    };
    try { return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }
    catch { return null; }
  }, [marca, tipo, mIdx, pago, descPesos, bonoZonal, comisionCredito, docItems, accItems, auto, calc, cliente, vendedor]);

  const decodeDeal = useCallback((code) => {
    try {
      const clean = code.replace(/\s/g,"");
      const json = decodeURIComponent(escape(atob(clean)));
      const s = JSON.parse(json);
      if (!s.m || !s.t || s.i === undefined) return false;
      const models = CATALOGO[s.m]?.[s.t];
      if (!models || !models[s.i]) return false;
      setMarca(s.m); setTipo(s.t); setMIdx(s.i); setPago(s.p || "tmp");
      setDescPesos(s.d || ""); setBonoZonal(s.bz || ""); setComisionCredito(s.cc || "");
      if (s.cl) setCliente(s.cl);
      // Don't overwrite vendedor — keep the receiver's own name
      if (s.doc) {
        setDocItems(prev => prev.map(x => {
          const saved = s.doc.find(d => d.id === x.id);
          return saved ? { ...x, activo: !!saved.a, monto: saved.m } : x;
        }));
      }
      if (s.acc && s.acc.length) {
        setAccItems(s.acc.map(a => ({ id: uid(), nombre: a.n, monto: a.m })));
      }
      setLoadedDeal(true);
      return s; // Return parsed state for auto-save
    } catch { return false; }
  }, []);

  useEffect(() => {
    try {
      const hash = window.location.hash;
      if (hash && hash.length > 1) decodeDeal(hash.substring(1));
    } catch {}
  }, [decodeDeal]);

  // Load saved deals and vendedor from persistent storage
  useEffect(() => {
    (async () => {
      try {
        const r = await storage.get("deals");
        if (r && r.value) setDeals(JSON.parse(r.value));
      } catch {}
      try {
        const r = await storage.get("lastVendedor");
        if (r && r.value) setVendedor(r.value);
      } catch {}
    })();
  }, []);

  // ─── CLOSE DEAL: save + share ───
  const closeDeal = useCallback(async () => {
    if (!auto || !calc || !vendedor.trim()) return;
    setClosingStep("saving");
    const PL2 = {tmp:"TMP",cc:"Crédito Conv.",ci:"Compra Intel."};
    const now = new Date();
    const fecha = now.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"});
    const hora = now.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});

    const dealRecord = {
      id: Date.now(),
      fecha, hora,
      vendedor: vendedor.trim(),
      cliente: cliente.trim() || "—",
      marca, modelo: auto.modelo, cit: auto.cit,
      formaPago: PL2[pe],
      precioLista: auto.pl,
      bonoTotal: calc.fp.bono,
      descPompeyo: calc.descNum,
      bonoZonal: calc.bonoZonalNum,
      precioAuto: calc.precioAuto,
      documentacion: calc.totalDoc,
      accesorios: calc.totalAcc,
      totalCliente: calc.totalCliente,
      margenNeto: calc.margenNeto,
      comCredito: calc.comCredNum,
      utilidadProxy: calc.utilidadProxy,
      utilidadPct: calc.utilidadPct,
    };

    // Save to persistent storage
    try {
      const prev = await storage.get("deals").catch(() => null);
      const arr = prev && prev.value ? JSON.parse(prev.value) : [];
      arr.push(dealRecord);
      await storage.set("deals", JSON.stringify(arr));
      await storage.set("lastVendedor", vendedor.trim());
      setDeals(arr);
    } catch {}

    // Build share text
    const code = encodeDeal();
    const lines = [
      `📋 *Deal Final Cerrado*`,
      ``,
      `👤 Vendedor: ${vendedor.trim()}`,
      cliente.trim() ? `🧑 Cliente: ${cliente.trim()}` : null,
      `📅 ${fecha} ${hora}`,
      ``,
      `🚗 ${auto.modelo}`,
      `💰 Precio Lista: ${fmt(auto.pl)}`,
      `📝 Forma Pago: ${PL2[pe]}`,
      `🏷️ Bono: ${fmt(calc.fp.bono)}`,
      calc.descNum > 0 ? `🔻 Desc. Pompeyo: ${fmt(calc.descNum)} (${pct(calc.descPompeyoPct)})` : null,
      calc.bonoZonalNum > 0 ? `🌐 Bono Zonal: ${fmt(calc.bonoZonalNum)}` : null,
      ``,
      `💵 *Precio Auto: ${fmt(calc.precioAuto)}*`,
      `📄 Documentación: ${fmt(calc.totalDoc)}`,
      calc.totalAcc > 0 ? `🔧 Accesorios: ${fmt(calc.totalAcc)}` : null,
      ``,
      `✅ *Total Cliente: ${fmt(calc.totalCliente)}*`,
      ``,
      `📊 Utilidad: ${calc.utilIcon} ${fmt(calc.utilidadProxy)} (${pct(calc.utilidadPct)})`,
      `   Margen neto auto: ${fmt(calc.margenNeto)}`,
      calc.comCredNum > 0 ? `   Com. crédito: ${fmt(calc.comCredNum)}` : null,
      code ? `\n─────────────────\nCódigo Deal Final:\n${code}` : null,
    ].filter(Boolean).join("\n");

    // Share
    if (navigator.share) {
      try {
        await navigator.share({ title: `Deal: ${auto.modelo}`, text: lines });
      } catch {}
    } else {
      try { await navigator.clipboard.writeText(lines); } catch {}
    }
    setClosingStep("done");
    setTimeout(() => setClosingStep(null), 3000);
  }, [auto, calc, pe, marca, cliente, vendedor, encodeDeal]);

  // ─── EXPORT CSV ───
  const exportCSV = useCallback(async () => {
    const header = ["Fecha","Hora","Vendedor","Cliente","Marca","Modelo","CIT","Forma Pago","Precio Lista","Bono Total","Desc Pompeyo","Bono Zonal","Precio Auto","Documentación","Accesorios","Total Cliente","Margen Neto","Com Crédito","Utilidad Proxy","Utilidad %"];
    const rows = deals.map(d => [
      d.fecha, d.hora, d.vendedor, d.cliente, d.marca, d.modelo, d.cit, d.formaPago,
      d.precioLista, d.bonoTotal, d.descPompeyo, d.bonoZonal, d.precioAuto,
      d.documentacion, d.accesorios, d.totalCliente, d.margenNeto, d.comCredito,
      d.utilidadProxy, (d.utilidadPct * 100).toFixed(1) + "%"
    ].join("\t"));
    const csv = [header.join("\t"), ...rows].join("\n");
    try {
      await navigator.clipboard.writeText(csv);
      setShareMsg("csv"); setTimeout(() => setShareMsg(null), 2500);
    } catch {
      setShareMsg("err"); setTimeout(() => setShareMsg(null), 3000);
    }
  }, [deals]);

  // ─── DELETE single deal ───
  const deleteDeal = useCallback(async (dealId) => {
    const updated = deals.filter(d => d.id !== dealId);
    setDeals(updated);
    try { await storage.set("deals", JSON.stringify(updated)); } catch {}
  }, [deals]);

  // ─── AUTO-SAVE loaded deal to registry ───
  const autoSaveLoadedDeal = useCallback(async (s) => {
    const models = CATALOGO[s.m]?.[s.t];
    if (!models || !models[s.i]) return;
    const model = models[s.i];
    const pe = s.p || "tmp";
    const fp = model[pe];
    if (!fp) return;

    const descNum = Math.min(parseInt(s.d) || 0, Math.round(model.pl * model.margen));
    const bonoZonalNum = parseInt(s.bz) || 0;
    const precioAuto = model.pl - fp.bono - descNum - bonoZonalNum;
    const defaultMontos = [18400,89560,50000,15000,35000,0,0];
    let totalDoc = 0;
    if (s.doc) { s.doc.forEach(d => { if (d.a) totalDoc += (parseInt(d.m) || 0); }); }
    else { totalDoc = defaultMontos.reduce((a,b)=>a+b,0); }
    const totalAcc = s.acc ? s.acc.reduce((sum,a) => sum + (parseInt(a.m)||0), 0) : 0;
    const totalCliente = precioAuto + totalDoc + totalAcc;
    const margenBruto = Math.round(model.pl * model.margen);
    const aporteRedPesos = fp.aporteRed || 0;
    const margenNeto = margenBruto - aporteRedPesos - descNum - GASTOS_ROMA;
    const comCredNum = parseInt(s.cc) || 0;
    const utilidadProxy = margenNeto + comCredNum;
    const utilidadPct = model.pl > 0 ? utilidadProxy / model.pl : 0;
    const PL2 = {tmp:"TMP",cc:"Crédito Conv.",ci:"Compra Intel."};
    const now = new Date();

    const dealRecord = {
      id: Date.now(),
      fecha: now.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"}),
      hora: now.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),
      vendedor: s.v || "—",
      cliente: s.cl || "—",
      marca: s.m, modelo: model.modelo, cit: model.cit,
      formaPago: PL2[pe],
      precioLista: model.pl,
      bonoTotal: fp.bono,
      descPompeyo: descNum,
      bonoZonal: bonoZonalNum,
      precioAuto, documentacion: totalDoc, accesorios: totalAcc,
      totalCliente, margenNeto, comCredito: comCredNum,
      utilidadProxy, utilidadPct,
      recibido: true,
    };

    try {
      const prev = await storage.get("deals").catch(() => null);
      const arr = prev && prev.value ? JSON.parse(prev.value) : [];
      arr.push(dealRecord);
      await storage.set("deals", JSON.stringify(arr));
      setDeals(arr);
    } catch {}
  }, []);

  const handleLoadCode = useCallback(() => {
    const text = loadCode.trim();
    let result = decodeDeal(text);
    if (!result) {
      const lastLine = text.split("\n").pop().trim();
      result = decodeDeal(lastLine);
    }
    if (result && typeof result === "object") {
      setShowLoadInput(false); setLoadCode("");
      autoSaveLoadedDeal(result);
      setShareMsg("loaded"); setTimeout(() => setShareMsg(null), 3000);
    } else {
      setShareMsg("loadErr"); setTimeout(() => setShareMsg(null), 3000);
    }
  }, [loadCode, decodeDeal, autoSaveLoadedDeal]);

  const mc = marca === "Peugeot" ? C.peugeot : marca === "Citroën" ? C.citroen : C.accent;
  const PL = {tmp:"TMP",cc:"Crédito Conv.",ci:"Compra Inteligente"};

  const toggleDoc = (id) => setDocItems(d=>d.map(x=>x.id===id?{...x,activo:!x.activo}:x));
  const updateDocMonto = (id,v) => setDocItems(d=>d.map(x=>x.id===id?{...x,monto:v}:x));
  const addAcc = () => {
    if (!newAccNombre.trim()) return;
    setAccItems(a=>[...a,{id:uid(),nombre:newAccNombre.trim(),monto:parseInt(newAccMonto)||0}]);
    setNewAccNombre("");setNewAccMonto("");
  };
  const removeAcc = (id) => setAccItems(a=>a.filter(x=>x.id!==id));
  const updateAccMonto = (id,v) => setAccItems(a=>a.map(x=>x.id===id?{...x,monto:parseInt(v)||0}:x));

  // Chip style for desglose
  const chip = (label,value,color) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
      <span style={{fontSize:12,color:color||C.muted}}>{label}</span>
      <span style={{fontSize:12,fontWeight:600,color:color||C.text}}>{fmt(value)}</span>
    </div>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",maxWidth:460,margin:"0 auto",paddingBottom:auto?120:20,color:C.text,fontSize:14,lineHeight:1.5}}>

      {/* Header */}
      <div style={{background:marca?mc:C.primary,color:"#fff",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em"}}>Deal Final</div>
          <div style={{fontSize:11,opacity:0.6}}>{auto?auto.modelo:marca?`${marca} · ${tipo||""}`:"Calculadora de cierre · Jun 2026"}</div>
        </div>
        {marca && <div onClick={resetAll} style={{cursor:"pointer",fontSize:12,opacity:0.8,padding:"5px 10px",border:"1px solid rgba(255,255,255,.3)",borderRadius:6}}>Nuevo</div>}
      </div>

      {/* Brand / Type / Model selectors */}
      {!marca && (
        <div style={base.section}>
          <div style={base.secTitle}>Selecciona marca</div>
          <div style={{display:"flex",gap:10}}>
            {["Peugeot","Citroën"].map(m=>(
              <div key={m} onClick={()=>{setMarca(m);setTipo(null);setMIdx(null);}}
                style={{flex:1,padding:"20px 12px",borderRadius:10,border:`2px solid ${m==="Peugeot"?C.peugeot:C.citroen}`,background:C.card,textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:16,color:m==="Peugeot"?C.peugeot:C.citroen}}>
                {m}
              </div>
            ))}
          </div>
          {/* Cargar Deal compartido */}
          <div style={{marginTop:16}}>
            {!showLoadInput ? (
              <div onClick={()=>setShowLoadInput(true)}
                style={{padding:"12px",borderRadius:8,border:`1px dashed ${C.border}`,background:C.card,textAlign:"center",cursor:"pointer",fontSize:13,color:C.muted}}>
                📥 Cargar deal compartido
              </div>
            ) : (
              <div style={{...base.card}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Pega el código que recibiste:</div>
                <textarea value={loadCode} onChange={e=>setLoadCode(e.target.value)}
                  placeholder="Pega aquí el mensaje completo o solo el código"
                  style={{...base.input,minHeight:80,resize:"vertical",fontFamily:"monospace",fontSize:12}} />

                <input type="number" inputMode="numeric" value={a.monto||""} onChange={e=>updateAccMonto(a.id,e.target.value)}

              <input type="number" inputMode="numeric" value={newAccMonto} onChange={e=>setNewAccMonto(e.target.value)}

              <div style={{...base.divider,marginTop:8}} />
              <div style={base.row}>
                <span style={{fontWeight:700,fontSize:13}}>Total Accesorios</span>
                <span style={{fontWeight:700,fontSize:14}}>{fmt(calc.totalAcc)}</span>

              </div>

              {/* APC / Roma */}
              <div style={{marginTop:14,padding:"12px",background:C.bg,borderRadius:8}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:8}}>Distribución APC / Roma</div>

                <div style={{fontSize:11,fontWeight:700,color:mc,marginBottom:4}}>BONOS</div>
                <div style={{paddingLeft:8,marginBottom:8}}>
                  {chip("Aporte Stellantis (Marca)", calc.fp.aporteSte, C.accent)}
                  {pe !== "tmp" && calc.fp.aporteFin > 0 && chip("Aporte Financiera (cobro aparte)", calc.fp.aporteFin, "#7c3aed")}
                  {calc.bonoZonalNum > 0 && chip("Bono Zonal", calc.bonoZonalNum, C.green)}
                  <div style={{...base.divider,margin:"4px 0"}} />
                  {chip("Total Bonos", calc.fp.aporteSte + (pe!=="tmp"?(calc.fp.aporteFin||0):0) + calc.bonoZonalNum)}
                </div>

                <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:4}}>DESCUENTO (del margen dealer)</div>
                <div style={{paddingLeft:8}}>
                  {chip("Aporte Red CE (2,5%)", calc.aporteRedPesos, "#b45309")}
                  {calc.descNum > 0 && chip("Desc. Pompeyo", calc.descNum, C.red)}
                  <div style={{...base.divider,margin:"4px 0"}} />
                  {chip("Total Descuento", calc.aporteRedPesos + calc.descNum)}
                </div>
              </div>
            </div>
          )}
        </div>

      </>)}
    </div>
  );
}

// ─── RENDER ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DealFinal));
</script>
</body>
</html>
