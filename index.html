<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Deal Final · Pompeyo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f5f6f8; overflow-x:hidden; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
  input[type="number"] { -moz-appearance:textfield; }
  input:focus { border-color:#2563eb !important; box-shadow:0 0 0 2px rgba(37,99,235,0.15); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

// ─── GOOGLE SHEETS CONFIG ───────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-ho5U6qudG-3hztvFYUzQtCp1FG0CqMN8LeJmUK5UI6VoZwZ9ivtJFWQKrdkTuLTh/exec";

// ─── CATÁLOGO: se carga 100% desde Google Sheets al abrir la app ───────────
const GASTOS_ROMA = 204500;
const fmt = (n) => "$" + Math.round(n).toLocaleString("es-CL");
const pct = (n) => (n * 100).toFixed(1) + "%";
const parsePesos = (v) => { const s = String(v||"").replace(/\./g,"").replace(/,/g,""); return parseInt(s) || 0; };

// ─── localStorage helpers ───────────────────────────────────────────────────
const LS_PREFIX = "df_";
const lsGet = (k) => { try { return JSON.parse(localStorage.getItem(LS_PREFIX+k)); } catch(e) { return null; } };
const lsSet = (k,v) => { try { localStorage.setItem(LS_PREFIX+k, JSON.stringify(v)); } catch(e) {} };
const lsGetDeals = () => lsGet("deals") || [];
const lsSaveDeal = (d) => { const deals = lsGetDeals(); deals.unshift(d); lsSet("deals", deals); };
const lsDeleteDeal = (id) => { const deals = lsGetDeals().filter(d=>d.id!==id); lsSet("deals", deals); };

// ─── Deal encode/decode (base64 para WhatsApp) ─────────────────────────────
const encodeDeal = (d) => { try { return btoa(unescape(encodeURIComponent(JSON.stringify(d)))); } catch(e) { return ""; } };
const decodeDeal = (s) => { try { return JSON.parse(decodeURIComponent(escape(atob(s.trim())))); } catch(e) { return null; } };

// ─── STYLES ─────────────────────────────────────────────────────────────────
const C = {
  bg:"#f5f6f8", card:"#fff", border:"#e0e3e8",
  primary:"#18181b", accent:"#2563eb", accentLight:"#dbeafe",
  text:"#18181b", muted:"#64748b", light:"#94a3b8",
  green:"#16a34a", greenBg:"#dcfce7", yellow:"#ca8a04", yellowBg:"#fef9c3",
  red:"#dc2626", redBg:"#fee2e2", peugeot:"#0f2b5b", citroen:"#c4161c",
};

const base = {
  input:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.border,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",outline:"none",background:C.card},
  row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"},
  label:{fontSize:13,color:C.muted},
  val:{fontSize:14,fontWeight:600},
  divider:{height:1,background:C.border,margin:"8px 0"},
  section:{padding:"14px 18px"},
  secTitle:{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:C.muted,marginBottom:10},
  card:{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:14,marginBottom:10},
};

let _id = Date.now();
const uid = () => ++_id;
const PL = {tmp:"TMP",cc:"Crédito Conv.",ci:"Compra Inteligente"};

// ═══════════════════════════════════════════════════════════════════════════
function DealFinal() {
  // Catalog state
  const [catalogo, setCatalogo] = useState({});
  const [catSource, setCatSource] = useState("cargando");
  const [catLoading, setCatLoading] = useState(true);
  const [catError, setCatError] = useState(false);

  // Navigation: "home" | "calc" | "import"
  const [view, setView] = useState("home");

  // Calculator state
  const [marca, setMarca] = useState(null);
  const [tipo, setTipo] = useState(null);
  const [mIdx, setMIdx] = useState(null);
  const [pago, setPago] = useState("tmp");
  const [descPesos, setDescPesos] = useState("");
  const [bonoZonal, setBonoZonal] = useState("");
  const [comisionCredito, setComisionCredito] = useState("");
  const [showUtil, setShowUtil] = useState(false);
  const [vendedor, setVendedor] = useState(lsGet("vendedor") || "");
  const [cliente, setCliente] = useState("");
  const [confirmCierre, setConfirmCierre] = useState(false);

  // Documentation items
  const defaultDocs = [
    {id:1,nombre:"SOAP",monto:18400,activo:true},
    {id:2,nombre:"Inscripción",monto:89560,activo:true},
    {id:3,nombre:"Trámite",monto:50000,activo:true},
    {id:4,nombre:"TAG",monto:15000,activo:true},
    {id:5,nombre:"GRAB",monto:35000,activo:true},
    {id:6,nombre:"Permiso Circulación",monto:0,activo:true},
    {id:7,nombre:"Impuesto Verde",monto:0,activo:true},
  ];
  const [docItems, setDocItems] = useState(defaultDocs);
  const [accItems, setAccItems] = useState([]);
  const [newAccNombre, setNewAccNombre] = useState("");
  const [newAccMonto, setNewAccMonto] = useState("");

  // Deal registry
  const [deals, setDeals] = useState(lsGetDeals());
  const [importCode, setImportCode] = useState("");
  const [copyMsg, setCopyMsg] = useState("");

  // ─── Cargar catálogo desde Google Sheets al abrir la app ───
  useEffect(() => {
    setCatLoading(true);
    setCatError(false);
    fetch(SCRIPT_URL + "?action=catalogo")
      .then(r => r.json())
      .then(data => {
        if (data && data.Peugeot) {
          setCatalogo(data);
          setCatSource("sheets");
        } else {
          setCatError(true);
        }
      })
      .catch(() => setCatError(true))
      .finally(() => setCatLoading(false));
  }, []);

  // ─── Derived data ───
  const modelos = useMemo(() => {
    if (!marca || !tipo) return [];
    return catalogo[marca]?.[tipo] || [];
  }, [marca, tipo, catalogo]);

  const familias = useMemo(() => {
    const map = {};
    modelos.forEach((m, i) => {
      if (!map[m.familia]) map[m.familia] = [];
      map[m.familia].push({...m, idx:i});
    });
    return map;
  }, [modelos]);

  const auto = mIdx !== null ? modelos[mIdx] : null;
  const formasPago = useMemo(() => {
    if (!auto) return ["tmp","cc"];
    const fps = ["tmp","cc"];
    if (auto.ci) fps.push("ci");
    return fps;
  }, [auto]);
  const pe = formasPago.includes(pago) ? pago : "tmp";

  // ─── Calculations ───
  const calc = useMemo(() => {
    if (!auto) return null;
    const fp = auto[pe];
    if (!fp) return null;
    const esCom = tipo === "Comerciales";
    const maxDescPesos = Math.round(auto.pl * auto.margen);
    const descNum = Math.min(parsePesos(descPesos), maxDescPesos);
    const descPompeyoPct = auto.pl > 0 ? descNum / auto.pl : 0;
    const bonoZonalNum = parsePesos(bonoZonal);
    const aporteRedPesos = fp.aporteRed || 0;
    const cePct = auto.pl > 0 ? aporteRedPesos / auto.pl : 0;
    const totalDadoPct = descPompeyoPct + cePct;
    const sumaAportes = aporteRedPesos + (fp.aporteSte||0) + (fp.aporteFin||0);
    const ivaBono = fp.bono - sumaAportes;
    const precioAuto = auto.pl - fp.bono - descNum - bonoZonalNum;
    const precioNeto = Math.round(precioAuto / 1.19);
    const totalDoc = docItems.filter(d=>d.activo).reduce((s,d)=>s+parsePesos(d.monto), 0);
    const totalAcc = accItems.reduce((s,a)=>s+parsePesos(a.monto), 0);
    const totalCliente = precioAuto + totalDoc + totalAcc;
    const margenBruto = maxDescPesos;
    const margenDisponible = margenBruto - aporteRedPesos;
    const margenNetoAuto = margenDisponible - descNum;
    const margenNeto = margenNetoAuto - GASTOS_ROMA;
    const comCredNum = parsePesos(comisionCredito);
    const utilidadProxy = margenNeto + comCredNum;
    const utilidadPct = auto.pl > 0 ? utilidadProxy / auto.pl : 0;
    let alertaDesc = null;
    if (descNum > maxDescPesos) alertaDesc = "roja";
    else if (totalDadoPct > 0.04) alertaDesc = "amarilla";
    let utilColor = C.green, utilIcon = "🟢";
    if (utilidadPct < 0.03) { utilColor = C.red; utilIcon = "🔴"; }
    else if (utilidadPct < 0.05) { utilColor = C.yellow; utilIcon = "🟡"; }
    return { fp, esCom, descNum, descPompeyoPct, totalDadoPct, cePct, maxDescPesos, bonoZonalNum,
      ivaBono, precioAuto, precioNeto, totalDoc, totalAcc, totalCliente,
      margenBruto, aporteRedPesos, margenDisponible, margenNetoAuto, margenNeto,
      comCredNum, utilidadProxy, utilidadPct, alertaDesc, utilColor, utilIcon };
  }, [auto, pe, descPesos, bonoZonal, docItems, accItems, comisionCredito, tipo]);

  // ─── Actions ───
  const mc = marca === "Peugeot" ? C.peugeot : marca === "Citroën" ? C.citroen : C.accent;

  const resetCalc = useCallback(() => {
    setMarca(null);setTipo(null);setMIdx(null);setPago("tmp");
    setDescPesos("");setBonoZonal("");setComisionCredito("");
    setShowUtil(false);setAccItems([]);setCliente("");setConfirmCierre(false);
    setDocItems(defaultDocs.map(d=>({...d})));
  }, []);

  const goHome = () => { resetCalc(); setView("home"); };

  const toggleDoc = (id) => setDocItems(d=>d.map(x=>x.id===id?{...x,activo:!x.activo}:x));
  const updateDocMonto = (id,v) => setDocItems(d=>d.map(x=>x.id===id?{...x,monto:v}:x));
  const addAcc = () => {
    if (!newAccNombre.trim()) return;
    setAccItems(a=>[...a,{id:uid(),nombre:newAccNombre.trim(),monto:parsePesos(newAccMonto)}]);
    setNewAccNombre("");setNewAccMonto("");
  };
  const removeAcc = (id) => setAccItems(a=>a.filter(x=>x.id!==id));
  const updateAccMonto = (id,v) => setAccItems(a=>a.map(x=>x.id===id?{...x,monto:parsePesos(v)}:x));

  // ─── Cerrar Deal ───
  const cerrarDeal = () => {
    if (!auto || !calc) return;
    const deal = {
      id: Date.now(), fecha: new Date().toLocaleDateString("es-CL"),
      vendedor, cliente, marca, tipo, modelo: auto.modelo, cit: auto.cit,
      formaPago: PL[pe], precioLista: auto.pl, bonoTotal: calc.fp.bono,
      descPompeyo: calc.descNum, bonoZonal: calc.bonoZonalNum,
      precioAuto: calc.precioAuto, totalDoc: calc.totalDoc,
      totalAcc: calc.totalAcc, totalCliente: calc.totalCliente,
      utilidadProxy: calc.utilidadProxy, utilidadPct: calc.utilidadPct,
      aporteRed: calc.aporteRedPesos, aporteSte: calc.fp.aporteSte,
      aporteFin: calc.fp.aporteFin || 0,
    };
    lsSaveDeal(deal);
    setDeals(lsGetDeals());

    // Post to Sheets if connected
    if (SCRIPT_URL) {
      fetch(SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({action:"deal", deal}) }).catch(()=>{});
    }

    // WhatsApp share
    const code = encodeDeal(deal);
    const msg = `🚗 *DEAL FINAL*\n📅 ${deal.fecha}\n👤 Vendedor: ${vendedor}\n👥 Cliente: ${cliente}\n\n🔹 ${auto.modelo}\n💰 Lista: ${fmt(auto.pl)}\n🎯 Pago: ${PL[pe]}\n📉 Bono: ${fmt(calc.fp.bono)}\n${calc.descNum>0?`🔻 Desc: ${fmt(calc.descNum)}\n`:""}${calc.bonoZonalNum>0?`📍 Zonal: ${fmt(calc.bonoZonalNum)}\n`:""}\n💵 *Precio Auto: ${fmt(calc.precioAuto)}*\n📋 Doc: ${fmt(calc.totalDoc)}\n${calc.totalAcc>0?`🔧 Acc: ${fmt(calc.totalAcc)}\n`:""}\n✅ *TOTAL CLIENTE: ${fmt(calc.totalCliente)}*\n\n📎 Código: ${code}`;
    const waUrl = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(waUrl, "_blank");
    goHome();
  };

  // ─── Import deal from code ───
  const importDeal = () => {
    const d = decodeDeal(importCode);
    if (!d) { alert("Código inválido"); return; }
    if (!lsGetDeals().find(x=>x.id===d.id)) { lsSaveDeal(d); setDeals(lsGetDeals()); }
    setImportCode(""); setView("home");
  };

  const deleteDeal = (id) => { lsDeleteDeal(id); setDeals(lsGetDeals()); };

  const copyRegistro = () => {
    const header = "Fecha\tVendedor\tCliente\tModelo\tPago\tPrecio Lista\tBono\tDesc\tZonal\tPrecio Auto\tDoc\tAcc\tTotal Cliente";
    const rows = deals.map(d=>`${d.fecha}\t${d.vendedor}\t${d.cliente}\t${d.modelo}\t${d.formaPago}\t${d.precioLista}\t${d.bonoTotal}\t${d.descPompeyo}\t${d.bonoZonal}\t${d.precioAuto}\t${d.totalDoc}\t${d.totalAcc}\t${d.totalCliente}`);
    navigator.clipboard.writeText(header+"\n"+rows.join("\n"))
      .then(()=>{ setCopyMsg("✅ Copiado"); setTimeout(()=>setCopyMsg(""),2000); })
      .catch(()=>{ setCopyMsg("❌ Error"); setTimeout(()=>setCopyMsg(""),2000); });
  };

  const chip = (label,value,color) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
      <span style={{fontSize:12,color:color||C.muted}}>{label}</span>
      <span style={{fontSize:12,fontWeight:600,color:color||C.text}}>{fmt(value)}</span>
    </div>
  );

  const modelCount = Object.values(catalogo).reduce((s,brand)=>s+Object.values(brand).reduce((s2,arr)=>s2+arr.length,0),0);

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════════════
  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",maxWidth:460,margin:"0 auto",paddingBottom:120,color:C.text,fontSize:14,lineHeight:1.5}}>

      {/* ═══ HEADER ═══ */}
      <div style={{background:view==="calc"&&marca?mc:C.primary,color:"#fff",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em"}}>Deal Final</div>
          <div style={{fontSize:11,opacity:0.6}}>
            {view==="calc" && auto ? auto.modelo : view==="calc" && marca ? `${marca} · ${tipo||""}` : catLoading ? "Cargando catálogo..." : catError ? "⚠️ Sin conexión al catálogo" : `Catálogo Sheets · ${modelCount} modelos`}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {view !== "home" && <div onClick={goHome} style={{cursor:"pointer",fontSize:12,opacity:0.8,padding:"5px 10px",border:"1px solid rgba(255,255,255,.3)",borderRadius:6}}>Inicio</div>}
          {view === "calc" && marca && <div onClick={()=>{resetCalc();}} style={{cursor:"pointer",fontSize:12,opacity:0.8,padding:"5px 10px",border:"1px solid rgba(255,255,255,.3)",borderRadius:6}}>Nuevo</div>}
        </div>
      </div>

      {/* ═══ HOME VIEW ═══ */}
      {view === "home" && (<>
        <div style={base.section}>
          {/* Vendedor */}
          <div style={{...base.card}}>
            <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Tu nombre (vendedor)</div>
            <input type="text" value={vendedor} onChange={e=>{setVendedor(e.target.value);lsSet("vendedor",e.target.value);}}
              placeholder="Ej: Javier Madariaga" style={base.input} />
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div onClick={()=>{setView("calc");resetCalc();}}
              style={{flex:1,padding:"16px",borderRadius:10,background:C.accent,color:"#fff",textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:15}}>
              + Nuevo Deal
            </div>
            <div onClick={()=>setView("import")}
              style={{flex:1,padding:"16px",borderRadius:10,border:"2px solid "+C.accent,color:C.accent,textAlign:"center",cursor:"pointer",fontWeight:600,fontSize:14}}>
              📎 Cargar Código
            </div>
          </div>

          {/* Catalog status */}
          {!catError ? (
            <div style={{...base.card,padding:10,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{catLoading?"⏳":"☁️"}</span>
              <span style={{fontSize:12,color:C.muted}}>
                {catLoading ? "Cargando catálogo desde Sheets..." : `Catálogo cargado desde Sheets (${modelCount} modelos)`}
              </span>
            </div>
          ) : (
            <div style={{...base.card,padding:10,border:"1px solid "+C.red,background:C.redBg}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>⚠️</span>
                <span style={{fontSize:12,color:C.red,fontWeight:600}}>No se pudo cargar el catálogo desde Sheets. Revisa tu conexión a internet.</span>
              </div>
              <div onClick={()=>window.location.reload()}
                style={{fontSize:12,color:C.accent,fontWeight:700,cursor:"pointer",textAlign:"center",padding:"6px",border:"1px solid "+C.accent,borderRadius:6}}>
                🔄 Reintentar
              </div>
            </div>
          )}

          {/* Deal Registry */}
          <div style={{...base.secTitle,marginTop:14}}>Registro de Deals ({deals.length})</div>
          {deals.length > 0 && (
            <div onClick={copyRegistro} style={{fontSize:12,color:C.accent,cursor:"pointer",marginBottom:10,fontWeight:600}}>
              📋 Copiar registro como tabla {copyMsg && <span style={{color:C.green}}>{copyMsg}</span>}
            </div>
          )}
          {deals.length === 0 && <div style={{...base.card,textAlign:"center",color:C.muted,fontSize:13}}>Sin deals registrados</div>}
          {deals.map(d => {
            const utilOk = d.utilidadPct >= 0.05;
            const utilWarn = d.utilidadPct >= 0.03 && d.utilidadPct < 0.05;
            const bg = utilOk ? C.greenBg : utilWarn ? C.yellowBg : C.redBg;
            const bc = utilOk ? C.green : utilWarn ? C.yellow : C.red;
            return (
              <div key={d.id} style={{...base.card,borderLeft:"3px solid "+bc,background:bg+"44"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{d.modelo}</div>
                    <div style={{fontSize:11,color:C.muted}}>{d.fecha} · {d.vendedor} · {d.cliente}</div>
                    <div style={{fontSize:12,marginTop:4}}>{d.formaPago} · Total: <b>{fmt(d.totalCliente)}</b></div>
                  </div>
                  <div onClick={()=>deleteDeal(d.id)} style={{cursor:"pointer",fontSize:16,color:C.red,padding:"0 4px"}}>×</div>
                </div>
              </div>
            );
          })}
        </div>
      </>)}

      {/* ═══ IMPORT VIEW ═══ */}
      {view === "import" && (
        <div style={base.section}>
          <div style={base.secTitle}>Cargar Deal desde código</div>
          <div style={base.card}>
            <div style={{fontSize:13,color:C.muted,marginBottom:8}}>Pegá el código que te llegó por WhatsApp:</div>
            <textarea value={importCode} onChange={e=>setImportCode(e.target.value)}
              placeholder="Pegar código base64 aquí..." rows={4}
              style={{...base.input,resize:"vertical",fontFamily:"monospace",fontSize:12}} />
            <div onClick={importDeal}
              style={{marginTop:10,padding:"12px",borderRadius:8,background:C.accent,color:"#fff",textAlign:"center",cursor:"pointer",fontWeight:600}}>
              Cargar Deal
            </div>
          </div>
          <div style={{fontSize:12,color:C.muted,marginTop:8}}>
            <b>¿Cómo funciona?</b> Cuando un vendedor cierra un deal, la app genera un código. Ese código llega por WhatsApp. Copialo, pegalo acá arriba y apretá "Cargar Deal" para agregarlo a tu registro.
          </div>
        </div>
      )}

      {/* ═══ CALCULATOR VIEW ═══ */}
      {view === "calc" && (<>

        {/* Brand */}
        {!marca && (
          <div style={base.section}>
            <div style={base.secTitle}>Selecciona marca</div>
            <div style={{display:"flex",gap:10}}>
              {["Peugeot","Citroën"].map(m=>(
                <div key={m} onClick={()=>{setMarca(m);setTipo(null);setMIdx(null);}}
                  style={{flex:1,padding:"20px 12px",borderRadius:10,border:"2px solid "+(m==="Peugeot"?C.peugeot:C.citroen),background:C.card,textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:16,color:m==="Peugeot"?C.peugeot:C.citroen}}>
                  {m}
                </div>
              ))}
            </div>
          </div>
        )}
        {marca && !tipo && (
          <div style={base.section}>
            <div style={base.secTitle}>Tipo de vehículo</div>
            <div style={{display:"flex",gap:10}}>
              {["Pasajeros","Comerciales"].map(t=>(
                <div key={t} onClick={()=>{setTipo(t);setMIdx(null);}}
                  style={{flex:1,padding:"16px",borderRadius:10,border:"2px solid "+mc,background:C.card,textAlign:"center",cursor:"pointer",fontWeight:600,fontSize:15,color:mc}}>
                  {t}
                </div>
              ))}
            </div>
            <div onClick={()=>setMarca(null)} style={{marginTop:10,fontSize:13,color:C.accent,cursor:"pointer"}}>← Cambiar marca</div>
          </div>
        )}
        {marca && tipo && mIdx === null && (
          <div style={base.section}>
            <div style={base.secTitle}>Selecciona modelo</div>
            {Object.entries(familias).map(([fam,items])=>(
              <div key={fam} style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:mc,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em"}}>{fam}</div>
                {items.map(m=>(
                  <div key={m.idx} onClick={()=>{setMIdx(m.idx);setPago("tmp");setDescPesos("");setBonoZonal("");setComisionCredito("");setAccItems([]);setShowUtil(false);setConfirmCierre(false);}}
                    style={{padding:"10px 14px",borderRadius:8,border:"1px solid "+C.border,background:C.card,marginBottom:5,cursor:"pointer"}}>
                    <div style={{fontSize:13,fontWeight:600}}>{m.modelo.replace(m.familia+" ","")}</div>
                    <div style={{fontSize:12,color:C.muted}}>Lista {fmt(m.pl)}</div>
                  </div>
                ))}
              </div>
            ))}
            <div onClick={()=>setTipo(null)} style={{fontSize:13,color:C.accent,cursor:"pointer"}}>← Cambiar tipo</div>
          </div>
        )}

        {/* ═══ DEAL CALCULATOR ═══ */}
        {auto && calc && (<>
          {/* Model Card */}
          <div style={base.section}>
            <div style={{...base.card,borderLeft:"3px solid "+mc}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>{auto.modelo}</div>
              <div style={base.row}><span style={base.label}>Precio Lista</span><span style={{fontSize:16,fontWeight:700}}>{fmt(auto.pl)}</span></div>
              <div style={base.row}><span style={base.label}>CIT</span><span style={{fontSize:10,fontFamily:"monospace",color:C.muted}}>{auto.cit}</span></div>
            </div>
            <div onClick={()=>setMIdx(null)} style={{fontSize:13,color:C.accent,cursor:"pointer"}}>← Cambiar modelo</div>
          </div>

          {/* Forma de Pago */}
          <div style={base.section}>
            <div style={base.secTitle}>Forma de Pago</div>
            <div style={{display:"flex",gap:6}}>
              {formasPago.map(fp=>(
                <div key={fp} onClick={()=>setPago(fp)}
                  style={{flex:1,padding:"10px 8px",borderRadius:8,border:"2px solid "+(pe===fp?mc:C.border),background:pe===fp?mc+"10":C.card,color:pe===fp?mc:C.muted,fontWeight:pe===fp?700:500,fontSize:12,textAlign:"center",cursor:"pointer"}}>
                  {PL[fp]}
                </div>
              ))}
            </div>
          </div>

          {/* Desglose Bonos */}
          <div style={base.section}>
            <div style={base.secTitle}>Desglose Bono {PL[pe]}</div>
            <div style={base.card}>
              {chip("Aporte Red (CE 2,5%)", calc.fp.aporteRed, "#b45309")}
              {chip("Aporte Stellantis (Marca)", calc.fp.aporteSte, C.accent)}
              {pe !== "tmp" && calc.fp.aporteFin > 0 && chip("Aporte Financiera", calc.fp.aporteFin, "#7c3aed")}
              {calc.ivaBono > 0 && chip("IVA sobre bonos", calc.ivaBono, C.muted)}
              <div style={base.divider} />
              <div style={base.row}>
                <span style={{fontSize:13,fontWeight:700}}>Bono Total</span>
                <span style={{fontSize:15,fontWeight:800,color:C.green}}>{fmt(calc.fp.bono)}</span>
              </div>
            </div>
          </div>

          {/* Descuentos */}
          <div style={base.section}>
            <div style={base.secTitle}>Descuentos</div>
            <div style={base.card}>
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:13,color:C.muted}}>Descuento Pompeyo ($)</span>
                  {calc.descNum > 0 && (
                    <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:6,
                      background:calc.totalDadoPct>0.04?C.yellowBg:C.greenBg,
                      color:calc.totalDadoPct>0.04?C.yellow:C.green}}>
                      {pct(calc.totalDadoPct)} dado
                    </span>
                  )}
                </div>
                <input type="number" inputMode="numeric" value={descPesos} onChange={e=>setDescPesos(e.target.value)}
                  placeholder="Monto en pesos" style={base.input} />
                {calc.descNum > 0 && (
                  <div style={{fontSize:11,color:C.muted,marginTop:4,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                    <span>Pompeyo {pct(calc.descPompeyoPct)}</span>
                    <span style={{color:C.light}}>+</span>
                    <span style={{color:"#b45309"}}>CE {pct(calc.cePct)}</span>
                    <span style={{color:C.light}}>=</span>
                    <span style={{fontWeight:700}}>Total {pct(calc.totalDadoPct)}</span>
                  </div>
                )}
                {calc.alertaDesc === "amarilla" && (
                  <div style={{padding:"8px 12px",borderRadius:6,background:C.yellowBg,borderLeft:"3px solid "+C.yellow,fontSize:12,marginTop:6}}>
                    ⚠️ Total dado sobre 4% (Pompeyo + CE) — requiere autorización
                  </div>
                )}
                {calc.alertaDesc === "roja" && (
                  <div style={{padding:"8px 12px",borderRadius:6,background:C.redBg,borderLeft:"3px solid "+C.red,fontSize:12,marginTop:6}}>
                    🚫 Tope: margen Red {fmt(calc.maxDescPesos)} ({pct(auto.margen)})
                  </div>
                )}
                <div style={{fontSize:11,color:C.light,marginTop:4}}>
                  Margen Red: {fmt(calc.maxDescPesos)} · Post CE: {fmt(calc.margenDisponible)} · Post Roma: {fmt(calc.margenDisponible - GASTOS_ROMA)}
                </div>
              </div>
              <div style={base.divider} />
              <div style={{marginTop:10}}>
                <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Bono Zonal ($)</div>
                <input type="number" inputMode="numeric" value={bonoZonal} onChange={e=>setBonoZonal(e.target.value)}
                  placeholder="0" style={base.input} />
              </div>
            </div>
          </div>

          {/* Precio Vehículo */}
          <div style={base.section}>
            <div style={base.secTitle}>Precio Vehículo</div>
            <div style={{...base.card,background:mc+"06"}}>
              <div style={base.row}><span style={base.label}>Precio Lista</span><span style={base.val}>{fmt(auto.pl)}</span></div>
              <div style={base.row}><span style={{fontSize:12,color:"#b45309"}}>− Aporte Red (CE)</span><span style={{fontSize:12,color:"#b45309",fontWeight:600}}>−{fmt(calc.fp.aporteRed)}</span></div>
              <div style={base.row}><span style={{fontSize:12,color:C.accent}}>− Aporte Stellantis</span><span style={{fontSize:12,color:C.accent,fontWeight:600}}>−{fmt(calc.fp.aporteSte)}</span></div>
              {pe !== "tmp" && calc.fp.aporteFin > 0 && (
                <div style={base.row}><span style={{fontSize:12,color:"#7c3aed"}}>− Aporte Financiera</span><span style={{fontSize:12,color:"#7c3aed",fontWeight:600}}>−{fmt(calc.fp.aporteFin)}</span></div>
              )}
              {calc.ivaBono > 0 && (
                <div style={base.row}><span style={{fontSize:12,color:C.muted}}>− IVA bonos</span><span style={{fontSize:12,color:C.muted,fontWeight:600}}>−{fmt(calc.ivaBono)}</span></div>
              )}
              {calc.descNum > 0 && (
                <div style={base.row}><span style={{fontSize:12,color:C.red}}>− Desc. Pompeyo</span><span style={{fontSize:12,color:C.red,fontWeight:600}}>−{fmt(calc.descNum)}</span></div>
              )}
              {calc.bonoZonalNum > 0 && (
                <div style={base.row}><span style={{fontSize:12,color:C.green}}>− Bono Zonal</span><span style={{fontSize:12,color:C.green,fontWeight:600}}>−{fmt(calc.bonoZonalNum)}</span></div>
              )}
              <div style={base.divider} />
              <div style={base.row}>
                <span style={{fontSize:15,fontWeight:700}}>Precio Auto</span>
                <span style={{fontSize:18,fontWeight:800}}>{fmt(calc.precioAuto)}</span>
              </div>
              <div style={base.row}><span style={base.label}>Neto sin IVA</span><span style={{fontSize:12,color:C.muted}}>{fmt(calc.precioNeto)}</span></div>
            </div>
          </div>

          {/* Documentación */}
          <div style={base.section}>
            <div style={base.secTitle}>Documentación</div>
            <div style={base.card}>
              {docItems.map(d => (
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",opacity:d.activo?1:0.4}}>
                  <div onClick={()=>toggleDoc(d.id)}
                    style={{width:22,height:22,borderRadius:6,border:"2px solid "+(d.activo?mc:C.border),background:d.activo?mc:"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:"#fff",fontSize:12,fontWeight:700}}>
                    {d.activo ? "✓" : ""}
                  </div>
                  <span style={{flex:1,fontSize:13,color:d.activo?C.text:C.muted}}>{d.nombre}</span>
                  <input type="number" inputMode="numeric" value={d.monto||""} onChange={e=>updateDocMonto(d.id,e.target.value)}
                    style={{width:100,padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"right",fontFamily:"inherit",outline:"none",background:d.activo?C.card:"#f0f0f0"}}
                    disabled={!d.activo} />
                </div>
              ))}
              <div style={base.divider} />
              <div style={base.row}>
                <span style={{fontWeight:700,fontSize:13}}>Total Documentación</span>
                <span style={{fontWeight:700,fontSize:14}}>{fmt(calc.totalDoc)}</span>
              </div>
            </div>
          </div>

          {/* Accesorios */}
          <div style={base.section}>
            <div style={base.secTitle}>Accesorios</div>
            <div style={base.card}>
              {accItems.map(a => (
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0"}}>
                  <div onClick={()=>removeAcc(a.id)}
                    style={{width:22,height:22,borderRadius:6,background:C.redBg,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>
                    ×
                  </div>
                  <span style={{flex:1,fontSize:13}}>{a.nombre}</span>
                  <input type="number" inputMode="numeric" value={a.monto||""} onChange={e=>updateAccMonto(a.id,e.target.value)}
                    style={{width:100,padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"right",fontFamily:"inherit",outline:"none"}} />
                </div>
              ))}
              {accItems.length > 0 && <div style={base.divider} />}
              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:accItems.length?6:0}}>
                <input type="text" value={newAccNombre} onChange={e=>setNewAccNombre(e.target.value)}
                  placeholder="Nombre" style={{...base.input,flex:1,padding:"8px 10px",fontSize:13}} />
                <input type="number" inputMode="numeric" value={newAccMonto} onChange={e=>setNewAccMonto(e.target.value)}
                  placeholder="$" style={{width:90,padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:13,textAlign:"right",fontFamily:"inherit",outline:"none"}} />
                <div onClick={addAcc}
                  style={{width:36,height:36,borderRadius:8,background:mc,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,fontWeight:700,flexShrink:0}}>
                  +
                </div>
              </div>
              {calc.totalAcc > 0 && (<>
                <div style={{...base.divider,marginTop:8}} />
                <div style={base.row}>
                  <span style={{fontWeight:700,fontSize:13}}>Total Accesorios</span>
                  <span style={{fontWeight:700,fontSize:14}}>{fmt(calc.totalAcc)}</span>
                </div>
              </>)}
            </div>
          </div>

          {/* Total Cliente */}
          <div style={base.section}>
            <div style={{...base.card,background:C.primary,color:"#fff",border:"none"}}>
              <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",opacity:0.6,marginBottom:6}}>Valor Total Cliente</div>
              <div style={{fontSize:26,fontWeight:800,marginBottom:4}}>{fmt(calc.totalCliente)}</div>
              <div style={{fontSize:11,opacity:0.5}}>
                Auto {fmt(calc.precioAuto)} + Doc {fmt(calc.totalDoc)}{calc.totalAcc>0?" + Acc "+fmt(calc.totalAcc):""}
              </div>
            </div>
          </div>

          {/* Utilidad Proxy */}
          <div style={base.section}>
            <div onClick={()=>setShowUtil(!showUtil)}
              style={{...base.card,cursor:"pointer",border:"2px solid "+(showUtil?calc.utilColor:C.border)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em",color:C.muted}}>Utilidad Proxy (interno)</div>
                  <div style={{fontSize:11,color:C.red,fontWeight:600}}>⛔ No mostrar al cliente</div>
                </div>
                <div style={{fontSize:18}}>{showUtil?"▾":"▸"}</div>
              </div>
            </div>
            {showUtil && (
              <div style={{...base.card,borderLeft:"3px solid "+calc.utilColor}}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Margen del negocio</div>
                {chip("Margen Red bruto ("+pct(auto.margen)+")", calc.margenBruto)}
                {chip("− Aporte Red CE (2,5%)", calc.aporteRedPesos, "#b45309")}
                <div style={base.divider} />
                {chip("= Margen post CE", calc.margenDisponible)}
                {calc.descNum > 0 && chip("− Desc. Pompeyo", calc.descNum, C.red)}
                {chip("= Margen post descuento", calc.margenNetoAuto)}
                {chip("− Gastos prorrateados Roma", GASTOS_ROMA, C.muted)}
                <div style={base.divider} />
                <div style={base.row}>
                  <span style={{fontSize:13,fontWeight:700}}>Margen neto auto</span>
                  <span style={{fontSize:14,fontWeight:700,color:calc.margenNeto<0?C.red:C.text}}>{fmt(calc.margenNeto)}</span>
                </div>
                <div style={{marginTop:10,marginBottom:8}}>
                  <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Comisión crédito ($)</div>
                  <input type="number" inputMode="numeric" value={comisionCredito} onChange={e=>setComisionCredito(e.target.value)}
                    placeholder="0" style={base.input} />
                </div>
                <div style={base.divider} />
                <div style={base.row}>
                  <span style={{fontWeight:700}}>Utilidad Proxy</span>
                  <span style={{fontWeight:800,fontSize:17,color:calc.utilColor}}>{calc.utilIcon} {fmt(calc.utilidadProxy)}</span>
                </div>
                <div style={base.row}>
                  <span style={base.label}>% sobre precio lista</span>
                  <span style={{display:"inline-block",padding:"2px 8px",borderRadius:6,fontSize:12,fontWeight:700,
                    background:calc.utilidadPct>=0.05?C.greenBg:calc.utilidadPct>=0.03?C.yellowBg:C.redBg,
                    color:calc.utilColor}}>{pct(calc.utilidadPct)}</span>
                </div>
                {/* APC */}
                <div style={{marginTop:14,padding:"12px",background:C.bg,borderRadius:8}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:C.muted,marginBottom:8}}>Distribución APC / Roma</div>
                  <div style={{fontSize:11,fontWeight:700,color:mc,marginBottom:4}}>BONOS</div>
                  <div style={{paddingLeft:8,marginBottom:8}}>
                    {chip("Aporte Stellantis (Marca)", calc.fp.aporteSte, C.accent)}
                    {pe !== "tmp" && calc.fp.aporteFin > 0 && chip("Aporte Financiera (cobro aparte)", calc.fp.aporteFin, "#7c3aed")}
                    {calc.bonoZonalNum > 0 && chip("Bono Zonal", calc.bonoZonalNum, C.green)}
                    <div style={{...base.divider,margin:"4px 0"}} />
                    {chip("Total Bonos", calc.fp.aporteSte + (pe!=="tmp"?(calc.fp.aporteFin||0):0) + calc.bonoZonalNum)}
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:4}}>DESCUENTO (del margen dealer)</div>
                  <div style={{paddingLeft:8}}>
                    {chip("Aporte Red CE (2,5%)", calc.aporteRedPesos, "#b45309")}
                    {calc.descNum > 0 && chip("Desc. Pompeyo", calc.descNum, C.red)}
                    <div style={{...base.divider,margin:"4px 0"}} />
                    {chip("Total Descuento", calc.aporteRedPesos + calc.descNum)}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* ═══ CERRAR DEAL ═══ */}
          <div style={base.section}>
            {!confirmCierre ? (
              <div onClick={()=>setConfirmCierre(true)}
                style={{padding:"14px",borderRadius:10,background:C.green,color:"#fff",textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:15}}>
                ✅ Cerrar Deal
              </div>
            ) : (
              <div style={{...base.card,border:"2px solid "+C.green}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Confirmar cierre del deal</div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:13,color:C.muted,marginBottom:4}}>Nombre del cliente</div>
                  <input type="text" value={cliente} onChange={e=>setCliente(e.target.value)}
                    placeholder="Nombre del cliente" style={base.input} />
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
                  Se guardará en el registro local, se enviará a Sheets{SCRIPT_URL?" ✅":" (pendiente)"}, y se abrirá WhatsApp para compartir.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <div onClick={()=>setConfirmCierre(false)}
                    style={{flex:1,padding:"12px",borderRadius:8,border:"1px solid "+C.border,textAlign:"center",cursor:"pointer",fontSize:13,color:C.muted}}>
                    Cancelar
                  </div>
                  <div onClick={cerrarDeal}
                    style={{flex:1,padding:"12px",borderRadius:8,background:C.green,color:"#fff",textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:13,opacity:cliente.trim()&&vendedor.trim()?1:0.4,pointerEvents:cliente.trim()&&vendedor.trim()?"auto":"none"}}>
                    Confirmar y Compartir
                  </div>
                </div>
              </div>
            )}
          </div>
        </>)}
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DealFinal />);
</script>
</body>
</html>
